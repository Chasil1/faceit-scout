<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Faceit Scout</title>
<style>
/* extra styles for reports */
.tabs { display: flex; gap: 0; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border2); }
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); font-family: inherit; font-size: .88rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: .55rem 1.25rem .45rem; cursor: pointer; position: relative;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--red); color: #fff; font-size: .6rem; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%; margin-left: .35rem; vertical-align: middle;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.reports-list { display: flex; flex-direction: column; gap: .6rem; }
.report-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: .75rem 1rem; display: flex; gap: .8rem; align-items: flex-start;
}
.report-card.reviewed { opacity: .45; }
.report-card .rc-info { flex: 1; }
.report-card .rc-nick { font-weight: 700; font-size: 1rem; }
.report-card .rc-meta { font-size: .75rem; color: var(--dim); margin-top: .15rem; }
.report-card .rc-rank { display: flex; align-items: center; gap: .4rem; margin-top: .4rem; font-size: .8rem; color: var(--dim); }
.report-card .rc-actions { display: flex; flex-direction: column; gap: .35rem; align-items: flex-end; }
.rc-btn {
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
  padding: .3rem .7rem; font-family: inherit; font-size: .75rem; font-weight: 600;
  letter-spacing: .04em; cursor: pointer; white-space: nowrap;
}
.rc-btn:hover { border-color: var(--orange); }
.rc-btn.danger { border-color: transparent; color: var(--dim); }
.rc-btn.danger:hover { border-color: var(--red); color: var(--red); }
.rc-btn.confirm { background: rgba(255,85,0,.12); border-color: var(--orange); color: var(--orange); }
.rc-time { font-size: .68rem; color: var(--muted); }
.no-reports { text-align: center; color: var(--dim); padding: 2rem; font-size: .9rem; }

/* Reviews */
.reviews-list { display: flex; flex-direction: column; gap: .5rem; }
.review-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: .7rem 1rem; display: flex; gap: .9rem; align-items: flex-start;
}
.review-card .rv-rating { font-size: 1.2rem; flex-shrink: 0; padding-top: .1rem; }
.review-card .rv-body { flex: 1; min-width: 0; }
.review-card .rv-players { font-size: .78rem; color: var(--dim); margin-bottom: .25rem; display: flex; align-items: center; flex-wrap: wrap; gap: .3rem; }
.review-card .rv-players a { color: var(--orange); text-decoration: none; }
.review-card .rv-players a:hover { text-decoration: underline; }
.review-card .rv-comment { font-size: .9rem; color: var(--text); word-break: break-word; }
.review-card .rv-comment.empty { color: var(--muted); font-style: italic; }
.review-card .rv-time { font-size: .66rem; color: var(--muted); margin-top: .25rem; }
.review-card .rv-actions { flex-shrink: 0; }
.rv-del-btn {
  background: var(--bg3); border: 1px solid var(--border2); color: var(--dim);
  padding: .28rem .6rem; font-family: inherit; font-size: .72rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.rv-del-btn:hover { border-color: var(--red); color: var(--red); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #111111;
  --bg2:     #181818;
  --bg3:     #202020;
  --border:  #2a2a2a;
  --border2: #333333;
  --orange:  #FF5500;
  --red:     #ff3b3b;
  --text:    #f0f0f0;
  --dim:     #888888;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding: 1.5rem;
}

header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--orange);
  text-transform: uppercase;
}

.meta { color: var(--dim); font-size: .85rem; }
a.back-link { color: var(--dim); text-decoration: none; font-size: .85rem; }
a.back-link:hover { color: var(--orange); }

.toolbar {
  display: flex;
  gap: .6rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
#search {
  flex: 1;
  min-width: 240px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .6rem .9rem;
  font-family: inherit;
  font-size: .95rem;
  outline: none;
}
#search:focus { border-color: var(--orange); }

.filter-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .6rem 1rem;
  font-family: inherit;
  font-size: .85rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  cursor: pointer;
}
.filter-btn.active { border-color: var(--orange); color: var(--orange); }
.filter-btn:hover { background: var(--bg2); }

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg2);
  border: 1px solid var(--border);
}
th, td {
  text-align: left;
  padding: .55rem .75rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
th {
  background: var(--bg3);
  color: var(--dim);
  font-weight: 600;
  font-size: .72rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  position: sticky;
  top: 0;
}
tr:hover td { background: var(--bg3); }
tr.is-smurf td { background: rgba(255,59,59,.06); }
tr.is-smurf:hover td { background: rgba(255,59,59,.10); }

td.nick { font-weight: 600; }
td.nick a { color: var(--text); text-decoration: none; }
td.nick a:hover { color: var(--orange); }

.avatar {
  width: 28px; height: 28px;
  border-radius: 3px;
  object-fit: cover;
  vertical-align: middle;
  margin-right: .5rem;
  background: var(--bg3);
}

.rank-img-sm { width: 28px; height: 31px; object-fit: contain; vertical-align: middle; }

.lvl {
  display: inline-block;
  min-width: 22px;
  text-align: center;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: .78rem;
  font-weight: 700;
  background: #333;
}
.lvl.lv10 { background: #e04a1a; }
.lvl.lv9, .lvl.lv8 { background: #c46218; }
.lvl.lv7, .lvl.lv6 { background: #8a6b16; }
.lvl.lv5, .lvl.lv4 { background: #4a5a1a; }

.smurf-toggle {
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .25rem .55rem;
  border: 1px solid var(--border2);
  border-radius: 3px;
  font-size: .75rem;
  letter-spacing: .05em;
  background: var(--bg3);
  color: var(--dim);
  user-select: none;
}
.smurf-toggle:hover { border-color: var(--red); color: var(--text); }
.smurf-toggle.on {
  background: rgba(255,59,59,.15);
  border-color: var(--red);
  color: #fff;
}

.rank-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: .25rem .55rem;
  font-family: inherit;
  font-size: .75rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: .3rem;
}
.rank-btn:hover { border-color: var(--orange); }
.rank-btn.empty { color: var(--dim); font-style: italic; }

.state {
  text-align: center;
  color: var(--dim);
  padding: 2rem;
  font-size: .95rem;
}

/* Modal */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-bg.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  padding: 1.25rem;
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 1rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 1rem;
}
.modal label {
  display: block;
  color: var(--dim);
  font-size: .75rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: .4rem;
}

.tier-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .4rem;
  margin-bottom: .9rem;
}
.tier-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .5rem .2rem;
  font-family: inherit;
  font-size: .78rem;
  cursor: pointer;
  text-align: center;
}
.tier-btn:hover { border-color: var(--orange); }
.tier-btn.active { border-color: var(--orange); background: rgba(255,85,0,.12); color: var(--orange); }

.star-row, .lb-row { margin-bottom: .9rem; }
.stars {
  display: flex;
  gap: .3rem;
}
.star-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .4rem 0;
  flex: 1;
  font-family: inherit;
  cursor: pointer;
}
.star-btn.active { border-color: var(--orange); background: rgba(255,85,0,.12); color: var(--orange); }

#lb-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .5rem .7rem;
  font-family: inherit;
}
#lb-input:focus { border-color: var(--orange); outline: none; }

.modal-actions {
  display: flex;
  gap: .5rem;
  justify-content: flex-end;
  margin-top: 1rem;
}
.btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: .55rem 1.1rem;
  font-family: inherit;
  font-size: .85rem;
  letter-spacing: .05em;
  cursor: pointer;
}
.btn:hover { border-color: var(--orange); }
.btn.primary { background: var(--orange); border-color: var(--orange); color: #111; font-weight: 700; }
.btn.primary:hover { filter: brightness(1.08); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(255,59,59,.12); }

.hidden { display: none !important; }

/* Profile modal */
.modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem; }
.modal-box { background:#181818;border:1px solid #333;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:1.25rem; }
.modal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem; }
.modal-close { background:none;border:none;color:#888;font-size:1rem;cursor:pointer;line-height:1; }
.modal-close:hover { color:#fff; }
.profile-box { max-width:520px; }
.profile-loading { text-align:center;color:var(--dim);padding:2rem 0; }
.profile-head { display:flex;gap:1rem;align-items:center;padding-bottom:1rem;border-bottom:1px solid #252525; }
.profile-avatar { width:64px;height:64px;object-fit:cover;border:1px solid #333;background:#202020; }
.profile-head-info { flex:1;min-width:0; }
.profile-nick { font-size:1.15rem;font-weight:700;letter-spacing:.03em; }
.profile-sub { color:var(--dim);font-size:.78rem;margin-top:.2rem; }
.profile-sub a { color:var(--orange);text-decoration:none; }
.profile-sub a:hover { text-decoration:underline; }
.profile-head-stats { display:flex;gap:.5rem;align-items:center; }
.profile-section { padding:1rem 0;border-bottom:1px solid #252525;display:flex;gap:1rem;align-items:center;flex-wrap:wrap; }
.profile-section:last-child { border-bottom:none; }
.profile-label { font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem; }
.decency-wrap { flex:1;min-width:180px; }
.decency-head { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.4rem; }
.decency-pct { font-size:1.35rem;font-weight:700;letter-spacing:.04em; }
.decency-counts { font-size:.78rem;color:var(--dim); }
.decency-bar { height:8px;background:#252525;border:1px solid #303030;overflow:hidden;position:relative; }
.decency-fill { position:absolute;inset:0 auto 0 0;transition:width .4s ease,background .3s ease; }
.decency-fill.low  { background:linear-gradient(90deg,#e23a3a,#ff5a5a); }
.decency-fill.mid  { background:linear-gradient(90deg,#d0a52e,#ffd04a); }
.decency-fill.high { background:linear-gradient(90deg,#2fa74a,#55d47a); }
.profile-stat-row { display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.82rem;color:#ccc; }
.profile-stat { display:flex;flex-direction:column;gap:.1rem; }
.profile-stat-label { font-size:.68rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase; }
.profile-stat-value { font-weight:700;color:#eee; }
.review-list { max-height:260px;overflow-y:auto;padding-right:.3rem; }
.review-item { display:flex;gap:.6rem;align-items:center;padding:.55rem 0;border-bottom:1px solid #1e1e1e;flex-wrap:wrap; }
.review-item:last-child { border-bottom:none; }
.review-item-meta { display:flex;align-items:center;gap:.6rem;width:100%; }
.review-avatar { width:28px;height:28px;object-fit:cover;border:1px solid #2a2a2a;background:#202020;flex-shrink:0; }
.review-nick { font-size:.85rem;font-weight:600;flex:1;min-width:0; }
.review-date { font-size:.7rem;color:var(--dim); }
.review-thumb { font-size:1rem;width:24px;text-align:center; }
.review-thumb.up { color:#32c850; }
.review-thumb.down { color:#ff3b3b; }
.review-comment-text { font-size:.78rem;color:#bbb;margin-top:.2rem;line-height:1.4;word-break:break-word; }
.review-empty { color:var(--dim);font-size:.8rem;text-align:center;padding:.8rem 0; }
.rank-img { width:38px;height:38px;object-fit:contain; }
.rank-img-wrap { position:relative;width:38px;height:38px; }
.rank-lb-overlay { position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:.52rem;font-weight:700;color:#fff;text-shadow:0 0 4px #000,0 0 2px #000;white-space:nowrap; }
.lvl-badge { display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;font-size:.82rem;font-weight:700;border-radius:3px;background:#333; }
.lvl-badge.lv10{background:#e04a1a}.lvl-badge.lv9,.lvl-badge.lv8{background:#c46218}.lvl-badge.lv7,.lvl-badge.lv6{background:#8a6b16}.lvl-badge.lv5,.lvl-badge.lv4{background:#4a5a1a}
</style>
</head>
<body>

<header>
  <h1>Admin</h1>
  <span style="flex:1"></span>
  <a class="back-link" href="/">← На головну</a>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="players">Гравці <span class="meta" id="count" style="font-size:.75rem;color:var(--dim);font-weight:400;letter-spacing:0;text-transform:none;margin-left:.35rem"></span></button>
  <button class="tab-btn" data-tab="reports">Репорти <span class="tab-badge hidden" id="report-badge"></span></button>
  <button class="tab-btn" data-tab="reviews">Відгуки <span class="tab-badge hidden" id="reviews-badge"></span></button>
</div>

<!-- Players tab -->
<div class="tab-panel active" id="tab-players">
<div class="toolbar">
  <input id="search" type="text" placeholder="Пошук за нікнеймом або account_id…" autocomplete="off">
  <button class="filter-btn" data-filter="all">Всі</button>
  <button class="filter-btn" data-filter="smurf">Тільки смурфи</button>
</div>

<div id="state" class="state">Завантаження…</div>
<table id="tbl" style="display:none">
  <thead>
    <tr>
      <th>Гравець</th>
      <th>Faceit LVL</th>
      <th>ELO</th>
      <th>Ранг Dota</th>
      <th>Smurf</th>
      <th>Реальний ранг</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
</div><!-- /tab-players -->

<!-- Reports tab -->
<div class="tab-panel" id="tab-reports">
  <div id="reports-state" class="state">Завантаження…</div>
  <div class="reports-list" id="reports-list"></div>
</div>

<!-- Reviews tab -->
<div class="tab-panel" id="tab-reviews">
  <div id="reviews-state" class="state">Завантаження…</div>
  <div class="reviews-list" id="reviews-list"></div>
</div>

<!-- Player profile modal -->
<div class="modal-overlay" id="profile-modal" style="display:none">
  <div class="modal-box profile-box">
    <div class="modal-header">
      <span class="modal-title" style="color:var(--orange)">Профіль гравця</span>
      <button class="modal-close" id="profile-close">✕</button>
    </div>
    <div id="profile-body" class="profile-body">
      <div class="profile-loading">Завантаження…</div>
    </div>
  </div>
</div>

<!-- Rank picker modal -->
<div class="modal-bg" id="rank-modal">
  <div class="modal">
    <h2 id="modal-title">Реальний ранг</h2>
    <label>Тір</label>
    <div class="tier-grid" id="tier-grid"></div>
    <div class="star-row" id="star-wrap">
      <label>Зірка</label>
      <div class="stars" id="stars"></div>
    </div>
    <div class="lb-row hidden" id="lb-wrap">
      <label>Leaderboard (Immortal)</label>
      <input id="lb-input" type="number" min="1" max="5000" placeholder="напр. 234">
    </div>
    <div class="modal-actions">
      <button class="btn" id="cancel-btn">Скасувати</button>
      <button class="btn primary" id="save-btn">Зберегти</button>
    </div>
  </div>
</div>

<script>
const RANK_NAMES = { 1:'Herald',2:'Guardian',3:'Crusader',4:'Archon',5:'Legend',6:'Ancient',7:'Divine',8:'Immortal' };

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function rankImgSrc(major, rankStr) {
  if (!major) return '/photo/SeasonalRank0-0.webp';
  if (major < 8) {
    const star = (rankStr?.match(/\s(\d)$/) || [])[1] || '1';
    return `/photo/SeasonalRank${major}-${star}.webp`;
  }
  const lb = (rankStr?.match(/#(\d+)/) || [])[1];
  return (lb && parseInt(lb) <= 1000) ? '/photo/SeasonalRankTop2.webp' : '/photo/SeasonalRankTop0.webp';
}

let players = [];
let filter = 'all';
let query = '';
let modalCtx = null;  // { account_id, tier, lb }

// ── Load ───────────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch('/api/admin/players');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    players = data.players || [];
    render();
  } catch (e) {
    document.getElementById('state').textContent = 'Помилка: ' + e.message;
  }
}

function render() {
  const q = query.trim().toLowerCase();
  const list = players.filter(p => {
    if (filter === 'smurf' && !p.is_smurf) return false;
    if (!q) return true;
    return (p.nickname || '').toLowerCase().includes(q) || String(p.account_id).includes(q);
  });

  document.getElementById('count').textContent = `${list.length} / ${players.length}`;

  const tbody = document.getElementById('rows');
  if (list.length === 0) {
    document.getElementById('tbl').style.display = 'none';
    document.getElementById('state').style.display = '';
    document.getElementById('state').textContent = 'Порожньо.';
    return;
  }
  document.getElementById('state').style.display = 'none';
  document.getElementById('tbl').style.display = '';

  tbody.innerHTML = list.map(p => {
    const avatar = p.avatar
      ? `<img class="avatar" src="${esc(p.avatar)}" onerror="this.style.display='none'">`
      : `<span class="avatar"></span>`;
    const name = p.nickname || '(без імені)';
    const link = p.account_id ? `https://www.opendota.com/players/${p.account_id}` : '#';
    const lvl = p.faceit_level || 0;
    const elo = p.faceit_elo || '—';
    const rankImg = `<img class="rank-img-sm" src="${rankImgSrc(p.dota_rank_major, p.dota_rank)}" title="${esc(p.dota_rank || 'Unranked')}">`;
    const realRank = p.is_smurf
      ? `<button class="rank-btn" data-acc="${p.account_id}">
           <img class="rank-img-sm" src="${rankImgSrc(p.real_rank_major, p.real_rank)}">
           ${esc(p.real_rank || '?')}
         </button>`
      : `<button class="rank-btn empty" data-acc="${p.account_id}" disabled>—</button>`;
    return `
      <tr class="${p.is_smurf ? 'is-smurf' : ''}" data-acc="${p.account_id}">
        <td class="nick">${avatar}<a href="${esc(link)}" target="_blank" rel="noopener">${esc(name)}</a></td>
        <td><span class="lvl lv${Math.min(lvl,10)}">${lvl || '?'}</span></td>
        <td>${esc(elo)}</td>
        <td>${rankImg} <span style="color:var(--dim);font-size:.8rem">${esc(p.dota_rank || '—')}</span></td>
        <td>
          <span class="smurf-toggle ${p.is_smurf ? 'on' : ''}" data-acc="${p.account_id}">
            ${p.is_smurf ? '✓ SMURF' : '○ позначити'}
          </span>
        </td>
        <td>${realRank}</td>
      </tr>`;
  }).join('');

  tbody.querySelectorAll('.smurf-toggle').forEach(el => {
    el.onclick = () => {
      const acc = +el.dataset.acc;
      const p = players.find(x => x.account_id === acc);
      if (!p) return;
      if (p.is_smurf) {
        if (confirm(`Зняти мітку Smurf з ${p.nickname || acc}?`)) toggleOff(acc);
      } else {
        openModal(p);
      }
    };
  });
  tbody.querySelectorAll('.rank-btn:not([disabled])').forEach(el => {
    el.onclick = () => {
      const p = players.find(x => x.account_id === +el.dataset.acc);
      if (p) openModal(p);
    };
  });
}

// ── Modal ──────────────────────────────────────────────────────────────
function buildModalControls() {
  const tierGrid = document.getElementById('tier-grid');
  tierGrid.innerHTML = Object.entries(RANK_NAMES).map(([k, name]) =>
    `<button class="tier-btn" data-tier="${k}">${name}</button>`
  ).join('');
  const stars = document.getElementById('stars');
  stars.innerHTML = [1,2,3,4,5].map(s => `<button class="star-btn" data-star="${s}">${s}</button>`).join('');

  tierGrid.querySelectorAll('.tier-btn').forEach(b => b.onclick = () => {
    tierGrid.querySelectorAll('.tier-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    modalCtx.tier = +b.dataset.tier;
    const isImmortal = modalCtx.tier === 8;
    document.getElementById('star-wrap').classList.toggle('hidden', isImmortal);
    document.getElementById('lb-wrap').classList.toggle('hidden', !isImmortal);
    if (isImmortal) modalCtx.star = null;
  });
  stars.querySelectorAll('.star-btn').forEach(b => b.onclick = () => {
    stars.querySelectorAll('.star-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    modalCtx.star = +b.dataset.star;
  });
}

function openModal(p) {
  modalCtx = { account_id: p.account_id, tier: null, star: null, lb: null };
  document.getElementById('modal-title').textContent = `Реальний ранг · ${p.nickname || p.account_id}`;

  // reset
  document.querySelectorAll('.tier-btn').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.star-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('lb-input').value = '';
  document.getElementById('star-wrap').classList.remove('hidden');
  document.getElementById('lb-wrap').classList.add('hidden');

  // prefill from existing real rank
  if (p.real_rank_tier) {
    const major = Math.floor(p.real_rank_tier / 10);
    const minor = p.real_rank_tier % 10;
    modalCtx.tier = major;
    const tb = document.querySelector(`.tier-btn[data-tier="${major}"]`);
    if (tb) tb.classList.add('active');
    if (major === 8) {
      document.getElementById('star-wrap').classList.add('hidden');
      document.getElementById('lb-wrap').classList.remove('hidden');
      if (p.real_leaderboard_rank) document.getElementById('lb-input').value = p.real_leaderboard_rank;
    } else if (minor) {
      modalCtx.star = minor;
      const sb = document.querySelector(`.star-btn[data-star="${minor}"]`);
      if (sb) sb.classList.add('active');
    }
  }

  document.getElementById('rank-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('rank-modal').classList.remove('open');
  modalCtx = null;
}

async function save() {
  if (!modalCtx) return;
  const { account_id, tier } = modalCtx;
  if (!tier) { alert('Вибери тір'); return; }
  let rank_tier, lb = null;
  if (tier === 8) {
    rank_tier = 80;
    const lbVal = document.getElementById('lb-input').value.trim();
    if (lbVal) lb = parseInt(lbVal);
  } else {
    const star = modalCtx.star || 1;
    rank_tier = tier * 10 + star;
  }
  try {
    const r = await fetch(`/api/admin/smurf/${account_id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_smurf: true, real_rank_tier: rank_tier, real_leaderboard_rank: lb })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    closeModal();
    await load();
  } catch (e) {
    alert('Помилка: ' + e.message);
  }
}

async function toggleOff(account_id) {
  try {
    const r = await fetch(`/api/admin/smurf/${account_id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_smurf: false })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    await load();
  } catch (e) {
    alert('Помилка: ' + e.message);
  }
}

// ── Wire up ────────────────────────────────────────────────────────────
document.getElementById('search').oninput = (e) => { query = e.target.value; render(); };
document.querySelectorAll('.filter-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.filter;
    render();
  };
});
document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
document.getElementById('cancel-btn').onclick = closeModal;
document.getElementById('save-btn').onclick = save;
document.getElementById('rank-modal').onclick = (e) => { if (e.target.id === 'rank-modal') closeModal(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ── Tabs ───────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'reports') loadReports();
    if (btn.dataset.tab === 'reviews') loadReviews();
  };
});

// ── Reports ────────────────────────────────────────────────────────────
let reports = [];

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('uk-UA') + ' ' + d.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
}

async function loadReports() {
  document.getElementById('reports-state').style.display = '';
  document.getElementById('reports-state').textContent = 'Завантаження…';
  document.getElementById('reports-list').innerHTML = '';
  try {
    const r = await fetch('/api/admin/reports');
    const data = await r.json();
    reports = data.reports || [];
    renderReports();
  } catch (e) {
    document.getElementById('reports-state').textContent = 'Помилка: ' + e.message;
  }
}

function renderReports() {
  const pending = reports.filter(r => !r.reviewed);
  const badge = document.getElementById('report-badge');
  if (pending.length) {
    badge.textContent = pending.length;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const list = document.getElementById('reports-list');
  if (reports.length === 0) {
    document.getElementById('reports-state').style.display = '';
    document.getElementById('reports-state').textContent = 'Репортів немає.';
    list.innerHTML = '';
    return;
  }
  document.getElementById('reports-state').style.display = 'none';

  list.innerHTML = reports.map(r => {
    const rankHtml = r.real_rank
      ? `<img style="width:22px;height:24px;vertical-align:middle;margin-right:.3rem"
              src="${rankImgSrc(r.real_rank_major, r.real_rank)}">
         <span>${esc(r.real_rank)}</span>`
      : '<span style="color:var(--dim)">ранг не вказано</span>';
    const matchLink = r.match_room_id
      ? `<a href="/?room=${encodeURIComponent(r.match_room_id)}" style="color:var(--orange);font-size:.72rem"
             target="_blank">${esc(r.match_room_id.slice(0,30))}…</a>`
      : '';
    const reviewedBadge = r.reviewed
      ? `<span style="font-size:.68rem;color:var(--dim)">${r.action_taken === 'mark_smurf' ? '✓ позначено' : '✗ відхилено'}</span>` : '';
    return `
      <div class="report-card ${r.reviewed ? 'reviewed' : ''}" data-id="${r.id}" data-acc="${r.account_id}">
        <div class="rc-info">
          <div class="rc-nick">${esc(r.nickname || '(без імені)')}</div>
          <div class="rc-meta">
            <a href="https://steamcommunity.com/profiles/${r.account_id + 76561197960265728}"
               target="_blank" rel="noopener"
               style="color:var(--orange);text-decoration:none">Steam #${r.account_id}</a>
            · ${fmtTime(r.created_at)}
          </div>
          ${r.discord ? `<div class="rc-meta" style="margin-top:.2rem">Discord: <span style="color:var(--text)">${esc(r.discord)}</span></div>` : ''}
          ${matchLink ? `<div class="rc-meta" style="margin-top:.2rem">Матч: ${matchLink}</div>` : ''}
          <div class="rc-meta" style="margin-top:.2rem">
            Репортер: ${r.reporter_nickname
              ? `<a href="https://www.faceit.com/en/players/${esc(r.reporter_nickname)}" target="_blank" rel="noopener" style="color:var(--orange);text-decoration:none">${esc(r.reporter_nickname)}</a>`
              : '<span style="color:var(--muted)">невідомо</span>'}
          </div>
          <div class="rc-rank">Заявлений ранг: ${rankHtml}</div>
        </div>
        <div class="rc-actions">
          ${reviewedBadge}
          ${!r.reviewed ? `
            <button class="rc-btn confirm" onclick="reportMarkSmurf(${r.id}, ${r.account_id}, ${r.real_rank_tier || 'null'}, ${r.real_leaderboard_rank || 'null'})">
              ✓ Позначити смурфом
            </button>
            <button class="rc-btn danger" onclick="reportDismiss(${r.id})">✗ Відхилити</button>
          ` : ''}
        </div>
      </div>`;
  }).join('');
}

async function reportMarkSmurf(reportId, accountId, rankTier, lbRank) {
  if (!rankTier) {
    openModal(players.find(p => p.account_id === accountId) || { account_id: accountId, nickname: '', real_rank_tier: null });
    return;
  }
  try {
    await fetch(`/api/admin/smurf/${accountId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_smurf: true, real_rank_tier: rankTier, real_leaderboard_rank: lbRank }),
    });
    await fetch(`/api/admin/reports/${reportId}/review?action=mark_smurf`, { method: 'POST' });
    await loadReports();
    await load();
  } catch(e) { alert('Помилка: ' + e.message); }
}

async function reportDismiss(reportId) {
  try {
    await fetch(`/api/admin/reports/${reportId}/review?action=dismiss`, { method: 'POST' });
    await loadReports();
  } catch(e) { alert('Помилка: ' + e.message); }
}

// ── Reviews ────────────────────────────────────────────────────────────
let reviewsData = [];

async function loadReviews() {
  document.getElementById('reviews-state').style.display = '';
  document.getElementById('reviews-state').textContent = 'Завантаження…';
  document.getElementById('reviews-list').innerHTML = '';
  try {
    const r = await fetch('/api/admin/reviews');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    reviewsData = data.reviews || [];
    renderReviews();
  } catch (e) {
    document.getElementById('reviews-state').textContent = 'Помилка: ' + e.message;
  }
}

function renderReviews() {
  const badge = document.getElementById('reviews-badge');
  if (reviewsData.length) {
    badge.textContent = reviewsData.length;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const list = document.getElementById('reviews-list');
  if (reviewsData.length === 0) {
    document.getElementById('reviews-state').style.display = '';
    document.getElementById('reviews-state').textContent = 'Відгуків немає.';
    list.innerHTML = '';
    return;
  }
  document.getElementById('reviews-state').style.display = 'none';

  list.innerHTML = reviewsData.map((rv, idx) => {
    const ratingIcon = rv.rating === 1 ? '👍' : '👎';
    const targetLink = rv.target_account_id
      ? `<span class="rv-player-link" data-acc="${rv.target_account_id}" style="color:var(--orange);cursor:pointer;font-weight:700">${esc(rv.target_nickname || rv.target_account_id)}</span>`
      : esc(rv.target_nickname || rv.target_account_id);
    const anonBadge = rv.is_anonymous
      ? ' <span style="font-size:.7rem;color:var(--dim);background:#2a2a2a;border:1px solid #3a3a3a;padding:.1rem .35rem;border-radius:3px">анонімно</span>'
      : '';
    const reviewerText = esc(rv.reviewer_nickname || rv.reviewer_faceit_id);
    const commentHtml = rv.comment
      ? `<div class="rv-comment">${esc(rv.comment)}</div>`
      : `<div class="rv-comment empty">(без коментаря)</div>`;
    return `
      <div class="review-card" data-idx="${idx}">
        <div class="rv-rating">${ratingIcon}</div>
        <div class="rv-body">
          <div class="rv-players">
            <span>${reviewerText}${anonBadge}</span>
            <span style="color:var(--muted)">→</span>
            ${targetLink}
          </div>
          ${commentHtml}
          <div class="rv-time">${fmtTime(rv.updated_at)}</div>
        </div>
        <div class="rv-actions">
          <button class="rv-del-btn" data-reviewer="${esc(rv.reviewer_faceit_id)}" data-target="${rv.target_account_id}">
            Видалити
          </button>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.rv-del-btn').forEach(btn => {
    btn.onclick = () => deleteReview(btn.dataset.reviewer, btn.dataset.target);
  });
  list.querySelectorAll('.rv-player-link').forEach(el => {
    el.onclick = () => openProfileModal(+el.dataset.acc);
  });
}

async function deleteReview(reviewerFaceitId, targetAccountId) {
  if (!confirm('Видалити цей відгук?')) return;
  try {
    const r = await fetch(`/api/admin/reviews/${encodeURIComponent(reviewerFaceitId)}/${targetAccountId}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    await loadReviews();
  } catch (e) {
    alert('Помилка: ' + e.message);
  }
}

// ── Profile modal ───────────────────────────────────────────────────────
function lvlClassP(lvl) { return `lv${Math.min(+lvl || 0, 10)}`; }

function rankImgSrcP(major, rankStr) {
  if (!major) return '/photo/SeasonalRank0-0.webp';
  if (major < 8) {
    const star = (rankStr?.match(/\s(\d)$/) || [])[1] || '1';
    return `/photo/SeasonalRank${major}-${star}.webp`;
  }
  const lb = (rankStr?.match(/#(\d+)/) || [])[1];
  return (lb && parseInt(lb) <= 1000) ? '/photo/SeasonalRankTop2.webp' : '/photo/SeasonalRankTop0.webp';
}

function rankIconP(major, rankStr) {
  const src = rankImgSrcP(major, rankStr);
  const title = esc(rankStr || 'Unranked');
  const lb = (major === 8) ? (rankStr?.match(/#(\d+)/) || [])[1] : null;
  if (lb) return `<div class="rank-img-wrap" title="${title}"><img class="rank-img" src="${src}" alt="${title}"><div class="rank-lb-overlay">${lb}</div></div>`;
  return `<img class="rank-img" src="${src}" alt="${title}" title="${title}">`;
}

function decencyClassP(pct) { return pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low'; }

function fmtReviewDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric' }); }
  catch (e) { return ''; }
}

async function openProfileModal(accountId) {
  if (!accountId) return;
  const modal = document.getElementById('profile-modal');
  const body = document.getElementById('profile-body');
  body.innerHTML = '<div class="profile-loading">Завантаження…</div>';
  modal.style.display = 'flex';
  try {
    const res = await fetch(`/api/profile/${accountId}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderAdminProfile(data, accountId);
  } catch (e) {
    body.innerHTML = '<div class="profile-loading">Не вдалося завантажити профіль.</div>';
  }
}

function renderAdminProfile(d, accountId) {
  const nick = d.nickname || `#${accountId}`;
  const avatar = d.avatar
    ? `<img class="profile-avatar" src="${esc(d.avatar)}" alt="" onerror="this.style.display='none'">`
    : `<div class="profile-avatar"></div>`;
  const lvl = d.faceit_level || 0;
  const smurfMark = d.is_smurf
    ? `<div style="position:relative;width:38px;height:38px" title="Справжній ранг: ${esc(d.real_rank || '?')}">${rankIconP(d.real_rank_major, d.real_rank)}</div>`
    : '';
  const rankTile = d.dota_rank_major
    ? `<div style="position:relative;width:38px;height:38px">${rankIconP(d.dota_rank_major, d.dota_rank)}</div>`
    : '';
  const lvlBadge = lvl ? `<div class="lvl-badge ${lvlClassP(lvl)}">${lvl}</div>` : '';

  const dcClass = decencyClassP(d.decency_pct);
  const decencyHtml = `
    <div class="decency-wrap">
      <div class="profile-label">Рейтинг порядочності</div>
      <div class="decency-head">
        <div class="decency-pct">${d.decency_pct}%</div>
        <div class="decency-counts">👍 ${d.likes} · 👎 ${d.dislikes}</div>
      </div>
      <div class="decency-bar"><div class="decency-fill ${dcClass}" style="width:${d.decency_pct}%"></div></div>
    </div>`;

  const statsItems = [];
  if (d.dota_rank) statsItems.push({ label: 'Ранг Dota', value: d.dota_rank });
  if (d.is_smurf && d.real_rank) statsItems.push({ label: 'Смурф ранг', value: d.real_rank });
  if (d.faceit_elo) statsItems.push({ label: 'Faceit ELO', value: d.faceit_elo });
  if (d.faceit_winrate != null) statsItems.push({ label: 'Вінрейт', value: `${d.faceit_winrate}%` });
  if (d.position) statsItems.push({ label: 'Ролі', value: [d.position, d.position2].filter(Boolean).join(' / ') });
  const statsHtml = statsItems.length
    ? `<div class="profile-stat-row">${statsItems.map(it => `<div class="profile-stat"><div class="profile-stat-label">${it.label}</div><div class="profile-stat-value">${esc(String(it.value))}</div></div>`).join('')}</div>`
    : '';

  const reviewsHtml = d.reviews && d.reviews.length
    ? d.reviews.map(r => {
        const av = r.avatar
          ? `<img class="review-avatar" src="${esc(r.avatar)}" alt="" onerror="this.style.display='none'">`
          : `<div class="review-avatar"></div>`;
        const thumb = r.rating === 1 ? '<div class="review-thumb up">👍</div>' : '<div class="review-thumb down">👎</div>';
        const commentHtml = r.comment ? `<div class="review-comment-text">${esc(r.comment)}</div>` : '';
        return `<div class="review-item"><div class="review-item-meta">${av}<div class="review-nick">${esc(r.nickname)}</div><div class="review-date">${fmtReviewDate(r.updated_at)}</div>${thumb}</div>${commentHtml}</div>`;
      }).join('')
    : '<div class="review-empty">Ще немає відгуків.</div>';

  document.getElementById('profile-body').innerHTML = `
    <div class="profile-head">
      ${avatar}
      <div class="profile-head-info">
        <div class="profile-nick">${esc(nick)}</div>
        <div class="profile-sub"><a href="https://www.opendota.com/players/${accountId}" target="_blank" rel="noopener">OpenDota ↗</a></div>
      </div>
      <div class="profile-head-stats">${smurfMark}${rankTile}${lvlBadge}</div>
    </div>
    ${statsHtml ? `<div class="profile-section">${statsHtml}</div>` : ''}
    <div class="profile-section">${decencyHtml}</div>
    <div class="profile-section" style="flex-direction:column;align-items:stretch">
      <div class="profile-label">Відгуки (${d.reviews.length})</div>
      <div class="review-list">${reviewsHtml}</div>
    </div>
  `;
}

document.getElementById('profile-close').onclick = () => { document.getElementById('profile-modal').style.display = 'none'; };
document.getElementById('profile-modal').onclick = e => { if (e.target.id === 'profile-modal') document.getElementById('profile-modal').style.display = 'none'; };
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('profile-modal').style.display = 'none';
    closeModal();
  }
});

// ── Load initial data + reports badge
buildModalControls();
load().then(() => {
  const missing = players.some(p => !p.nickname);
  if (missing) {
    fetch('/api/admin/backfill', { method: 'POST' })
      .then(r => r.json())
      .then(d => { if (d.updated > 0) load(); })
      .catch(() => {});
  }
  // Load reports silently to show badge count
  fetch('/api/admin/reports').then(r => r.json()).then(d => {
    reports = d.reports || [];
    const pending = reports.filter(r => !r.reviewed);
    const badge = document.getElementById('report-badge');
    if (pending.length) { badge.textContent = pending.length; badge.classList.remove('hidden'); }
  }).catch(() => {});
});
</script>
